replacements:
  - source:
      version: v1
      kind: Secret
      # If you change `metadata.name` in `config/components/secret.yaml` and
      # `internalCertManagement.secretName` in `config/components/manager/controller_manager_config.yaml`,
      # you should update the below name.
      name: webhook-server-cert
      fieldPath: metadata.name
    targets:
      - select:
          group: apps
          kind: Deployment
          name: controller-manager
        fieldPaths:
          - spec.template.spec.volumes.0.secret.secretName
        options:
          create: true
  - source:
      version: v1
      kind: Service
      # If you change `metadata.name` in `config/components/secret.yaml` and
      # `internalCertManagement.serviceName` in `config/components/manager/controller_manager_config.yaml`,
      # you should update the below name.
      name: webhook-service
      fieldPath: metadata.name
    targets:
      - select:
          group: admissionregistration.k8s.io
          kind: MutatingWebhookConfiguration
        fieldPaths:
          - webhooks.0.clientConfig.service.name
          - webhooks.1.clientConfig.service.name
          - webhooks.2.clientConfig.service.name
        options:
          create: true
      - select:
          group: admissionregistration.k8s.io
          kind: ValidatingWebhookConfiguration
        fieldPaths:
          - webhooks.0.clientConfig.service.name
          - webhooks.1.clientConfig.service.name
          - webhooks.2.clientConfig.service.name
          - webhooks.3.clientConfig.service.name
        options:
          create: true

# Adds namespace to all resources.
namespace: kueue-system

# Value of this field is prepended to the
# names of all resources, e.g. a deployment named
# "wordpress" becomes "alices-wordpress".
# Note that it should also match with the prefix (text before '-') of the namespace
# field above.
namePrefix: kueue-

# Labels to add to all resources and selectors.
#commonLabels:
#  someName: someValue

resources:
- ../components/crd
- ../components/rbac
- ../components/manager
- ../components/internalcert
# [WEBHOOK] To enable webhook, uncomment all the sections with [WEBHOOK] prefix including the one in
# ../components/crd/kustomization.yaml
- ../components/webhook
# [CERTMANAGER] To enable cert-manager, uncomment all sections with 'CERTMANAGER'. 'WEBHOOK' components are required.
# - ../components/certmanager
# [PROMETHEUS] To enable prometheus monitor, uncomment all sections with 'PROMETHEUS'.
#- ../components/prometheus

patchesStrategicMerge:
# Protect the /metrics endpoint by putting it behind auth.
# If you want your controller-manager to expose the /metrics
# endpoint w/o any authn/z, please comment the following line.
- manager_auth_proxy_patch.yaml

# Mount the controller config file for loading manager configurations
# through a ComponentConfig type
- manager_config_patch.yaml

# [WEBHOOK] To enable webhook, uncomment all the sections with [WEBHOOK] prefix including the one in
# crd/kustomization.yaml
- manager_webhook_patch.yaml

# [CERTMANAGER] To enable cert-manager, uncomment all sections with 'CERTMANAGER'.
# Uncomment 'CERTMANAGER' sections in crd/kustomization.yaml to enable the CA injection in the admission webhooks.
# 'CERTMANAGER' needs to be enabled to use ca injection
# - webhookcainjection_patch.yaml

